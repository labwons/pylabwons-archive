# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build Market Data

on:
  # schedule:
  #   - cron: '31 6 * * 1-5'  # KST 3:31 PM
  #   - cron: '0 13 * * 1-5' # KST 10:00 PM
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Build
      env:
        KRX_ID: ${{ secrets.KRX_ID }}
        KRX_PW: ${{ secrets.KRX_PW }}
      run: |
        python run/build_action.py

    - name: Commit and Push changes
      # env:
      #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run : |
        git config --global user.name 'labwons.manager'
        git config --global user.email 'snob.labwons@gmail.com'
        git add .
        
        TIMESTAMP=$(date)
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "GITHUB ACTION BUILD on $TIMESTAMP"
          git push
        fi
